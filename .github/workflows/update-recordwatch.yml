name: Update RecordWatch Canada

on:
  workflow_dispatch:
    inputs:
      climate_date:
        description: Optional climate date (YYYY-MM-DD); blank uses yesterday in Toronto
        required: false
        type: string
  schedule:
    - cron: '37 10,16 * * *'
      timezone: 'America/Toronto'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update record snapshot
        env:
          CLIMATE_DATE: ${{ inputs.climate_date }}
        run: |
          if [ -n "$CLIMATE_DATE" ]; then
            python scripts/update_records.py --date "$CLIMATE_DATE"
          else
            python scripts/update_records.py
          fi

      - name: Build weekly extremes recap
        run: python scripts/build_weekly.py

      - name: Commit changed data
        run: |
          git config user.name "recordwatch-bot"
          git config user.email "recordwatch-bot@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update RecordWatch data"
            git push
          fi
